services:
  backend:
    build: .
    environment:
      - DBURL=${DBURL}
      - PORT=8080
      - HOST=${HOST}
      - RateURL=${RateURL}
      - RateKey=${RateKey}
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - app-network
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

  postgres:
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
