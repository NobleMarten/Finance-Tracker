services:
  backend:
    build: .
    environment:
      - DBURL=${DBURL}
      - PORT=8080
      - HOST=${HOST}
    restart: always
    ports:
      - "8081:8080"
    networks:
      - app-network
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
