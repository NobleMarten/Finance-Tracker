services:
  backend:
    build: .
    environment:
      - DBURL=${DBURL}
      - PORT=8080
    restart: always
    networks:
      - app-network
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
